appId: com.scriptor.agent
productName: Scriptor
copyright: Copyright © 2025-2026

directories:
  output: release

files:
  - src/**/*
  - assets/**/*
  - node_modules/**/*
  - package.json

# Extract native modules from the asar archive.
# Native .node/.dll files can't be loaded from inside asar.
asarUnpack:
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/active-win/**/*"
  - "src/renderer/systemCapture.html"
  - "src/renderer/systemCapture.js"
  - "src/renderer/capturePreload.js"
  - "src/ai/summaryWorker.js"

extraResources:
  - from: bin/
    to: bin/
    filter:
      - "**/*"
  - from: node-runtime/
    to: node-runtime/
    filter:
      - "**/*"

afterPack: "build/afterPack.js"

win:
  target:
    - target: nsis
      arch:
        - x64
  # sign: "build/sign.js"           # Uncomment when Azure Trusted Signing is configured
  # signingHashAlgorithms: [sha256]  # See build/sign.js for setup instructions

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: false
  createStartMenuShortcut: true
  runAfterFinish: true
  include: "build/installer.nsh"

publish:
  - provider: github
    owner: "retvq"      # TODO: Set when repo is created
    repo: "scriptor-agent"
    private: true
    releaseType: release
